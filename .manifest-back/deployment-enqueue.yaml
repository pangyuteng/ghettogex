apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: gg
  name: enqueue
spec:
  replicas: 0
  selector:
    matchLabels:
      app: enqueue
  template:
    metadata:
      labels:
        app: enqueue
    spec:
      imagePullSecrets:
      - name: registry-credentials
      containers:
      - name: enqueue
        image: docker.io/pangyuteng/private:fi-flask-edge
        imagePullPolicy: Always
        command: ["python3"]
        args: ["enqueue.py"]
        env:
        - name: CACHE_FOLDER
          value: /mnt/sm-data/fi
        - name: AMQP_URI
          value: amqp://rabbitmq:5672
        - name: REDIS_URI
          value: redis://redis:6379/1
        - name: POSTGRES_URI
          value: postgres://postgres:postgres@postgres:5432/postgres
        volumeMounts:
        - name: sm-volume
          mountPath: /mnt/sm-data
      volumes:
      - name: sm-volume
        persistentVolumeClaim:
          claimName: sm-longhorn-pvc
