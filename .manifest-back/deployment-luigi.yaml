apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: gg
  name: luigi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: luigi
  template:
    metadata:
      labels:
        app: luigi
    spec:
      imagePullSecrets:
      - name: registry-credentials
      containers:
      - name: luigi
        image: docker.io/pangyuteng/private:fi-flask-edge
        imagePullPolicy: Always
        command: ["luigid"]
        ports:
        - containerPort: 8082
          name: web
          protocol: TCP
        volumeMounts:
        - name: nfs-volume
          mountPath: /var/lib/postgresql/data
          subPath: pgdata
      volumes:
      - name: nfs-volume
        nfs:
          server: 192.168.68.141
          path: /mnt/hd1/data
