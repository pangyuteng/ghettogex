apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: gg
  name: worker-stream
spec:
  replicas: 4
  selector:
    matchLabels:
      app: worker-stream
  template:
    metadata:
      labels:
        app: worker-stream
    spec:
      imagePullSecrets:
      - name: registry-credentials
      containers:
      - name: worker-stream
        image: docker.io/pangyuteng/private:fi-flask-edge
        imagePullPolicy: Always
        command: ["bash"]
        args: ["worker.sh","stream"]
        env:
        - name: CACHE_FOLDER
          value: /mnt/hd1/data/fi
        - name: CACHE_TASTY_FOLDER
          value: /mnt/hd1/data/tastyfi
        - name: AMQP_URI
          value: amqp://rabbitmq:5672
        - name: REDIS_URI
          value: redis://redis:6379/1
        - name: POSTGRES_URI
          value: postgres://postgres:postgres@postgres:5432/postgres
        - name: C_FORCE_ROOT
          value: "true"
        - name: IS_TEST
          valueFrom:
            secretKeyRef:
              name: tasty-env
              key: IS_TEST
        - name: TASTYTRADE_USERNAME
          valueFrom:
            secretKeyRef:
              name: tasty-env
              key: TASTYTRADE_USERNAME
        - name: TASTYTRADE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: tasty-env
              key: TASTYTRADE_PASSWORD
        volumeMounts:
        - name: nfs-volume
          mountPath: /mnt/hd1/data
      volumes:
      - name: nfs-volume
        nfs:
          server: 192.168.68.141
          path: /mnt/hd1/data
