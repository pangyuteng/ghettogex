apiVersion: apps/v1
kind: Deployment
metadata:
  name: fi-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fi-app
  template:
    metadata:
      labels:
        app: fi-app
    spec:
      imagePullSecrets:
      - name: registry-credentials
      containers:
      - name: web
        image: docker.io/pangyuteng/private:main
        imagePullPolicy: Always
        env:
        - name: CACHE_FOLDER
          value: /mnt/hd1/data/fi
        command: ["python"]
        args: ["qapp.py", "80"]
        ports:
        - containerPort: 80
          name: web
          protocol: TCP
        volumeMounts:
        - name: nfs-volume
          mountPath: /mnt/hd1
      volumes:
      - name: nfs-volume
        nfs:
          server: 192.168.68.147
          path: /mnt/hd1