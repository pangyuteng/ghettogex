apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: gg
  name: rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:4.2.6-management-alpine
        imagePullPolicy: Always
        ports:
        - containerPort: 5672
          name: web
          protocol: TCP
        - containerPort: 15672
          name: web-admin
          protocol: TCP