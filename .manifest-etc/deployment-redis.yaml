apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: gg
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:8.4.2-alpine
        imagePullPolicy: Always
        ports:
        - containerPort: 6379
          protocol: TCP