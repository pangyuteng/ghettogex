apiVersion: apps/v1
kind: Deployment
metadata:
  name: fi-cache-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fi-cache
  template:
    metadata:
      labels:
        app: fi-cache
    spec:
      imagePullSecrets:
      - name: registry-credentials
      containers:
      - name: web
        image: docker.io/pangyuteng/private:fi-flask-edge
        imagePullPolicy: Always
        env:
        - name: CACHE_FOLDER
          value: /mnt/hd1/data/fi
        - name: CACHE_TASTY_FOLDER
          value: /mnt/hd1/data/tastyfi
        - name: AMQP_URI
          value: amqp://fi-rabbitmq:5672
        - name: REDIS_URI
          value: redis://fi-redis:6379/1
        - name: POSTGRES_URI
          value: postgres://postgres:postgres@fi-postgres:5432/postgres
        command: ["python"]
        args: ["-m", "utils.data_cache"]
        ports:
        - containerPort: 80
          name: web
          protocol: TCP
        volumeMounts:
        - name: nfs-volume
          mountPath: /mnt/hd1/data
      volumes:
      - name: nfs-volume
        nfs:
          server: 192.168.68.141
          path: /mnt/hd1/data