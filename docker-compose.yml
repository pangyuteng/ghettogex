services:
    adminer:
        image: adminer
        ports:
            - 8080:8080
        restart: always
    postgres:
        build:
            context: .timescaledb
            dockerfile: Dockerfile
        image: timescaledb
        environment:
            POSTGRES_DB: "postgres"
            POSTGRES_USER: "postgres"
            POSTGRES_PASSWORD: "postgres"
            PGDATA: "/var/lib/postgresql/data/pgdata"
            TS_TUNE_MAX_CONNS: "3000"
        restart: always
        ports:
            - 5432:5432
        volumes:
           - db_volume:/var/lib/postgresql/data
    redis:
        image: redis:latest
        hostname: redis
        ports:
            - 6379:6379
        restart: always
        healthcheck:
            test: redis-cli ping
            interval: 60s
            timeout: 10s
            retries: 5
    rabbitmq:
        image: rabbitmq:management
        hostname: rabbitmq
        ports:
            - 5672:5672
            - 15672:15672
        restart: always
        healthcheck:
            test: rabbitmqctl status
            interval: 60s
            timeout: 10s
            retries: 5
    beat: &foobar
        build:
            context: flask
            dockerfile: Dockerfile
        image: ghettogex
        environment:
            C_FORCE_ROOT: "true"
            CACHE_FOLDER: /mnt/shared
            AMQP_URI: amqp://rabbitmq:5672
            REDIS_URI: redis://redis:6379/1
            POSTGRES_URI: postgres://postgres:postgres@postgres:5432/postgres
            LUIGI_URI: http://luigi:8082
            IS_TEST: ${IS_TEST}
            TASTYTRADE_CLIENT_SECRET: ${TASTYTRADE_CLIENT_SECRET}
            TASTYTRADE_REFRESH_TOKEN: ${TASTYTRADE_REFRESH_TOKEN}
            TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
            EXPECTED_HASH: ${EXPECTED_HASH}
        volumes:
           - shared_volume:/mnt/shared
        restart: always
        working_dir: /opt/fi/flask
        command: bash beat.sh
        depends_on:
            - redis
            - rabbitmq
        healthcheck:
            test: kill -0 $$(cat /tmp/celeryworker.pid)
            interval: 60s
            timeout: 10s
            retries: 5
            start_period: 40s
    luigi:
        <<: *foobar
        ports:
            - 8082:8082
        command: luigid
        healthcheck:
            test: curl -f http://localhost:8082 || exit 1
            interval: 30s
            timeout: 10s
            retries: 3
    worker-default:
        <<: *foobar
        command: bash worker.sh default
        deploy:
            mode: replicated
            replicas: 4
    worker-stream:
        <<: *foobar
        command: bash worker.sh stream
        deploy:
            mode: replicated
            replicas: 6
    flask:
        <<: *foobar
        ports:
            - 80:80
        command: python app.py 80
        healthcheck:
            test: curl -f http://localhost:80 || exit 1
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
volumes:
    shared_volume:
    db_volume: