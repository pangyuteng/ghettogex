<div id="{{div_name}}" hx-swap-oob="true">
<script>
var data = []
{%for n,row in df.iterrows() %}
data.push({
    x: [0, {{row.gex}}],
    y: [{{row.strike}}, {{row.strike}}],
    mode: 'lines',
    line: {color: 'rgb(100, 100, 244)'},
})
{% endfor %}

data.push({
    x: [ {{ df.gex.min() }}, {{ df.gex.max() }} ],
    y: [ {{ spot_price }}, {{ spot_price }} ],
    mode: 'lines',
    line: {
        color: 'rgb(244,10,10)',
        dash: 'dot',
        width: 1,
        alpha: 0.2
    }
})

var layout = { 
    title: {text: '{{ticker}} {{ "%0.2f" | format(spot_price|float) }}'},
    paper_bgcolor: 'rgba(0,0,0,0)',
    plot_bgcolor: 'rgba(0,0,0,0)',
    showlegend: false,
    font: {
        family: 'Courier New, monospace',
        size: 18,
        color: 'rgb(200,200,200)'
    }
};

Plotly.newPlot("{{ticker}}-plot", data, layout);
</script>

<div id="{{ticker}}-plot"></div>
<span class="badge rounded-pill text-bg-dark">
data_tstamp:{{ data_tstamp }}
</span>
<span class="badge rounded-pill text-bg-dark">
server_tstamp:{{ server_tstamp }}
</span>

</div>
