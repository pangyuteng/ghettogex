    let errorSpan = document.getElementById("errorSpan");
    let dataQcSpan = document.getElementById("dataQcSpan");

    let queryTimeSpan = document.getElementById("queryTimeSpan");
    let dataTstampSpan = document.getElementById("dataTstampSpan");
    let titleSpan = document.getElementById("titleSpan");

    ws.onmessage = function(event) {
        let newdata = JSON.parse(event.data);
        let meta = newdata.meta || {};

        // Update meta spans
        errorSpan.textContent = meta.error_status || '';
        dataQcSpan.textContent = meta.qc_comment || '';
        serverTstampSpan.textContent = meta.server_tstamp || '';
        queryTimeSpan.textContent = meta.duration_time || '';
        dataTstampSpan.textContent = meta.data_tstamp || '';

        titleSpan.textContent = "MYTITLE";
        let ticker = 'SPX';

        TICKER_CHARTS[ticker].forEach(function(chartType) {
            let tickerData = (newdata.tickers || {})[ticker] || {};
            let config = CHART_CONFIGS[chartType];
            let chartObj = (chartRegistry[ticker] || {})[chartType];
            if (config && config.update && chartObj) {
                config.update(chartObj, tickerData);
            }

        });
