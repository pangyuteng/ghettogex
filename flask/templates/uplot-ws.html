
<script>
    const ws = new WebSocket("/ws-ex?ticker={{ticker}}");
    let status = document.getElementById("status");
    ws.onmessage = function(event) {
        let newdata = JSON.parse(event.data);
        status.textContent = newdata.tstamp
        updateChartH(newdata);
        updateChartV(newdata);
        updateChartV2(newdata);
    }
</script>
