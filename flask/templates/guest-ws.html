<div id="surfUpdate" hx-swap-oob="true">
    <script>
    var layout_update = {
        title: {
            text: '{{tstamp}}'
        },
        autosize: false,
        width: 512,
        height: 512,
        paper_bgcolor: 'rgba(0,0,0,0)',
        plot_bgcolor: 'rgba(0,0,0,0)',
        margin: {
            l: 50,
            r: 50,
            b: 50,
            t: 50,
        },
        };
    
    var z_data=[];
    {% for x in surf_list %}
    z_data.push({{ x }});
    {% endfor %}
    
    var data_update = [{
        z: z_data,
        type: 'surface'
    }];
    
    Plotly.react(surfDiv, data_update, surfDiv.layout);

    </script>
</div>
<div id="strikeUpdate" hx-swap-oob="true">
    <script>
    var data = []
    {%for n,row in strike_df.iterrows() %}
    data.push({
        x: [0, {{row.gex}}],
        y: [{{row.strike}}, {{row.strike}}],
        mode: 'lines',
        width: 2,
        line: {color: 'rgb(100, 100, 244)'},
    })
    {% endfor %}
    
    data.push({
        x: [ {{ strike_df.gex.min() }}, {{ strike_df.gex.max() }} ],
        y: [ {{ spot_price }}, {{ spot_price }} ],
        mode: 'lines',
        line: {
            color: 'rgb(244,10,10)',
            dash: 'dot',
            width: 2,
            alpha: 0.2
        }
    })
    
    var layout = { 
        title: {text: '{{ticker}} {{ "%0.2f" | format(spot_price|float) }}'},
        autosize: false,
        width: 512,
        height: 512,
        paper_bgcolor: 'rgba(0,0,0,0)',
        plot_bgcolor: 'rgba(0,0,0,0)',
        showlegend: false,
        font: {
            family: 'Courier New, monospace',
            size: 18,
            color: 'rgb(200,200,200)'
        }
    };
    
    Plotly.newPlot(strikeDiv, data, strikeDiv.layout);
    </script>
    
    <span class="badge rounded-pill text-bg-dark">
    data_tstamp:{{ data_tstamp }}
    </span>
    <span class="badge rounded-pill text-bg-dark">
    server_tstamp:{{ server_tstamp }}
    </span>
    
</div>
