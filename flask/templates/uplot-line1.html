<script>

function makeChartLineV1() {
	
	const opts = {
		title: "net-gamma",
		width: 420,
		height: 420,
		series: [
			{},
			{
				label: "spot",
				scale: "scale0",
				value: (u, v) => v == null ? null : v.toFixed(2)+"",
				stroke: "rgba(200,200,200,1)",
				width: 2/devicePixelRatio,
			},
			{
				label: "volume",
				scale: "scale1",
				value: (u, v) => v == null ? null : v.toFixed(2) + "Bn/1prct",
				width: 2/devicePixelRatio,
				stroke: "rgba(0,100,0,0.6)",
			},
			{
				label: "state",
				scale: "scale1",
				value: (u, v) => v == null ? null : v.toFixed(2) + "Bn/1prct",
				width: 1/devicePixelRatio,
				stroke: "rgba(0,255,0,0.6)",
			}
		],
		axes: [
			{
				side: 0,
				stroke: "#666666",
				tick: {stroke: "#666666",width:1},
				grid: {stroke: "#666666",width:1},
			},
			{
				side: 3,
				scale: "scale0",
				values: (u, vals, space) => vals.map(v => v.toFixed(1) +""),
				stroke: "#666666",
				grid: {stroke: "#666666",width:1},
				tick: {stroke: "#666666",width:1},
			},
			{
				side: 1,
				scale: "scale1",
				values: (u, vals, space) => vals.map(v => v.toFixed(2) + "Bn/1prct"),
				stroke: "#666666",
				grid: {show: false},
				tick: {stroke: "#666666",width:1},
			},
		],
		// scales: {
		// 	"scale1": {
		// 		auto: false,
		// 		range: [0, 10],
		// 	}
		// }
	};
	
	return new uPlot(opts, [], document.getElementById("ChartLineV1"));
}

let mychartLineV1 = makeChartLineV1();

function updateChartLineV1(data){
	mychartLineV1.setData(data);
}


</script>
