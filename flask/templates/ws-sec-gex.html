<div id="myDivLevels" hx-swap-oob="true">
  <script>
  var updateDataDex = [];
  var updateDataStateGex = [];
  var updateDataConv = [];
  var updateDataVex = [];
  var updateDataCex = [];


  {% for n,row in df.iterrows() %}
  updateDataDex.push({
    x: [0, {{row.dex}}],
    y: [{{row.strike}}, {{row.strike}}],
    mode: 'lines',
    {% if row.dex > 0 %}
    line: {color: 'rgb(50, 255, 50)', width: 3}
    {% else %}
    line: {color: 'rgb(255, 50, 50)', width: 3}
    {% endif %}
  })
  updateDataStateGex.push({
    x: [0, {{row.state_gex}}],
    y: [{{row.strike}}, {{row.strike}}],
    mode: 'lines',
    {% if row.state_gex > 0 %}
    line: {color: 'rgb(50, 255, 50)', width: 3}
    {% else %}
    line: {color: 'rgb(255, 50, 50)', width: 3}
    {% endif %}
  })
  updateDataConv.push({
    x: [0, {{row.convexity}}],
    y: [{{row.strike}}, {{row.strike}}],
    mode: 'lines',
    {% if row.convexity > 0 %}
    line: {color: 'rgb(50, 255, 255)', width: 3}
    {% else %}
    line: {color: 'rgb(128, 50, 128)', width: 3}
    {% endif %}
  })
  updateDataVex.push({
    x: [0, {{row.vex}}],
    y: [{{row.strike}}, {{row.strike}}],
    mode: 'lines',
    {% if row.vex > 0 %}
    line: {color: 'rgb(50, 255, 50)', width: 3}
    {% else %}
    line: {color: 'rgb(255, 50, 50)', width: 3}
    {% endif %}
  })
  updateDataCex.push({
    x: [0, {{row.cex}}],
    y: [{{row.strike}}, {{row.strike}}],
    mode: 'lines',
    {% if row.cex > 0 %}
    line: {color: 'rgb(50, 255, 50)', width: 3}
    {% else %}
    line: {color: 'rgb(255, 50, 50)', width: 3}
    {% endif %}
  })
  {% endfor %}

  {% for lookback in lookback_keys %}
  {% if query_dict %}
  {% for n,row in query_dict[lookback].df.iterrows() %}
  updateDataStateGex.push({
      x: [{{row.state_gex}}, {{row.state_gex}}],
      y: [{{row.strike}}, {{row.strike}}],
      mode: 'markers',
      {% if lookback == 'strike-1min' %}
      marker: {color: 'rgb(200, 200, 255)', size: 5}
      {% elif lookback == 'strike-5min' %}
      marker: {color: 'rgb(200, 200, 250)', size: 5}
      {% elif lookback == 'strike-10min' %}
      marker: {color: 'rgb(150, 150, 200)', size: 3}
      {% elif lookback == 'strike-15min' %}
      marker: {color: 'rgb(100, 100, 150)', size: 3}
      {% elif lookback == 'strike-30min' %}
      marker: {color: 'rgb(100, 100, 100)', size: 3}
      {% else %}
      marker: {color: 'rgb(100, 100, 50)', size: 3}
      {% endif %}
  })
  updateDataConv.push({
      x: [{{row.convexity}}, {{row.convexity}}],
      y: [{{row.strike}}, {{row.strike}}],
      mode: 'markers',
      {% if lookback == 'strike-1min' %}
      marker: {color: 'rgb(200, 200, 255)', size: 5}
      {% elif lookback == 'strike-5min' %}
      marker: {color: 'rgb(200, 200, 250)', size: 5}
      {% elif lookback == 'strike-10min' %}
      marker: {color: 'rgb(150, 150, 200)', size: 3}
      {% elif lookback == 'strike-15min' %}
      marker: {color: 'rgb(100, 100, 150)', size: 3}
      {% elif lookback == 'strike-30min' %}
      marker: {color: 'rgb(100, 100, 100)', size: 3}
      {% else %}
      marker: {color: 'rgb(100, 100, 50)', size: 3}
      {% endif %}
  })
  updateDataDex.push({
      x: [{{row.dex}}, {{row.dex}}],
      y: [{{row.strike}}, {{row.strike}}],
      mode: 'markers',
      {% if lookback == 'strike-1min' %}
      marker: {color: 'rgb(200, 200, 255)', size: 5}
      {% elif lookback == 'strike-5min' %}
      marker: {color: 'rgb(200, 200, 250)', size: 5}
      {% elif lookback == 'strike-10min' %}
      marker: {color: 'rgb(150, 150, 200)', size: 3}
      {% elif lookback == 'strike-15min' %}
      marker: {color: 'rgb(100, 100, 150)', size: 3}
      {% elif lookback == 'strike-30min' %}
      marker: {color: 'rgb(100, 100, 100)', size: 3}
      {% else %}
      marker: {color: 'rgb(100, 100, 50)', size: 3}
      {% endif %}
  })
  updateDataVex.push({
      x: [{{row.vex}}, {{row.vex}}],
      y: [{{row.strike}}, {{row.strike}}],
      mode: 'markers',
      {% if lookback == 'strike-1min' %}
      marker: {color: 'rgb(200, 200, 255)', size: 5}
      {% elif lookback == 'strike-5min' %}
      marker: {color: 'rgb(200, 200, 250)', size: 5}
      {% elif lookback == 'strike-10min' %}
      marker: {color: 'rgb(150, 150, 200)', size: 3}
      {% elif lookback == 'strike-15min' %}
      marker: {color: 'rgb(100, 100, 150)', size: 3}
      {% elif lookback == 'strike-30min' %}
      marker: {color: 'rgb(100, 100, 100)', size: 3}
      {% else %}
      marker: {color: 'rgb(100, 100, 50)', size: 3}
      {% endif %}
  })
  updateDataCex.push({
      x: [{{row.cex}}, {{row.cex}}],
      y: [{{row.strike}}, {{row.strike}}],
      mode: 'markers',
      {% if lookback == 'strike-1min' %}
      marker: {color: 'rgb(200, 200, 255)', size: 5}
      {% elif lookback == 'strike-5min' %}
      marker: {color: 'rgb(200, 200, 250)', size: 5}
      {% elif lookback == 'strike-10min' %}
      marker: {color: 'rgb(150, 150, 200)', size: 3}
      {% elif lookback == 'strike-15min' %}
      marker: {color: 'rgb(100, 100, 150)', size: 3}
      {% elif lookback == 'strike-30min' %}
      marker: {color: 'rgb(100, 100, 100)', size: 3}
      {% else %}
      marker: {color: 'rgb(100, 100, 50)', size: 3}
      {% endif %}
  })
  {% endfor %}
  {% endif %}
  {% endfor %}


  {% if spot_price %}
  updateDataDex.push({
      x: [ {{ -1*xlimDex }}, {{ xlimDex }} ],
      y: [ {{ spot_price }}, {{ spot_price }} ],
      mode: 'lines',
      line: {
          color: 'rgb(255,255,255)',
          dash: 'dot',
          width: 2,
      }
  })
  updateDataStateGex.push({
      x: [ {{ -1*xlimState }}, {{ xlimState }} ],
      y: [ {{ spot_price }}, {{ spot_price }} ],
      mode: 'lines',
      line: {
          color: 'rgb(255,255,255)',
          dash: 'dot',
          width: 2,
      }
  })
  updateDataConv.push({
      x: [ {{ -1*xlimConvexity }}, {{ xlimConvexity }} ],
      y: [ {{ spot_price }}, {{ spot_price }} ],
      mode: 'lines',
      line: {
          color: 'rgb(255,255,255)',
          dash: 'dot',
          width: 2,
      }
  })
  updateDataVex.push({
      x: [ {{ -1*xlimVex }}, {{ xlimVex }} ],
      y: [ {{ spot_price }}, {{ spot_price }} ],
      mode: 'lines',
      line: {
          color: 'rgb(255,255,255)',
          dash: 'dot',
          width: 2,
      }
  })  
  updateDataCex.push({
      x: [ {{ -1*xlimCex }}, {{ xlimCex }} ],
      y: [ {{ spot_price }}, {{ spot_price }} ],
      mode: 'lines',
      line: {
          color: 'rgb(255,255,255)',
          dash: 'dot',
          width: 2,
      }
  })
  {% endif %}

  {% if max_state_gex %}
  updateDataStateGex.push({
      x: [ {{ -1*xlimState }}, {{ xlimState }} ],
      y: [ {{ max_state_gex }}, {{ max_state_gex }} ],
      mode: 'lines',
      line: {
          color: 'rgb(0,255,0)',
          dash: 'dot',
          width: 2,
      }
  })
  {% endif %}

  {% if max_convexity %}
  updateDataConv.push({
      x: [ {{ -1*xlimConvexity }}, {{ xlimConvexity }} ],
      y: [ {{ max_convexity }}, {{ max_convexity }} ],
      mode: 'lines',
      line: {
          color: 'rgb(0,255,0)',
          dash: 'dot',
          width: 2,
      }
  })
  {% endif %}

  {% if min_state_gex %}
  updateDataStateGex.push({
      x: [ {{ -1*xlimState }}, {{ xlimState }} ],
      y: [ {{ min_state_gex }}, {{ min_state_gex }} ],
      mode: 'lines',
      line: {
          color: 'rgb(255,0,0)',
          dash: 'dot',
          width: 2,
      }
  })
  {% endif %}

  {% if min_convexity %}
  updateDataConv.push({
      x: [ {{ -1*xlimConvexity }}, {{ xlimConvexity }} ],
      y: [ {{ min_convexity }}, {{ min_convexity }} ],
      mode: 'lines',
      line: {
          color: 'rgb(255,0,0)',
          dash: 'dot',
          width: 2,
      }
  })
  {% endif %}

  var updateLayoutStateGex = {
    title: {text: 'ghetto-gex {{ticker}} {{ "%0.2f" | format(spot_price|float) }}'},
    paper_bgcolor: 'rgba(0,0,0,0)',
    plot_bgcolor: 'rgba(0,0,0,0)',
    width: 420,
    height: 420,
    autosize: false,
    showlegend: false,
    margin: {
      r: 80,l: 0
    },
    yaxis: {
        showgrid: true,
        range: [ {{spot_price*0.98}}, {{spot_price*1.02}} ]
    },
    xaxis: {
        showgrid: true,
        range: [ {{ -1*xlimState }},{{ xlimState }} ]
    },
    font: {
        family: 'Courier New, monospace',
        size: 18,
        color: 'rgba(200,200,200,1)'
    }
  };

var updateLayoutConv = {
    title: {text: 'convexity {{ticker}} {{ "%0.2f" | format(spot_price|float) }}'},
    paper_bgcolor: 'rgba(0,0,0,0)',
    plot_bgcolor: 'rgba(0,0,0,0)',
    width: 420,
    height: 420,
    autosize: false,
    showlegend: false,
    margin: {
      r: 80,l: 0
    },
    yaxis: {
        showgrid: true,
        range: [ {{spot_price*0.98}}, {{spot_price*1.02}} ]
    },
    xaxis: {
        showgrid: true,
        range: [ {{ -1*xlimConvexity }},{{ xlimConvexity }} ]
    },
    font: {
        family: 'Courier New, monospace',
        size: 18,
        color: 'rgba(200,200,200,1)'
    }
  };

var updateLayoutDex = {
    title: {text: 'dex {{ticker}} {{ "%0.2f" | format(spot_price|float) }}'},
    paper_bgcolor: 'rgba(0,0,0,0)',
    plot_bgcolor: 'rgba(0,0,0,0)',
    width: 420,
    height: 420,
    autosize: false,
    showlegend: false,
    margin: {
      r: 80,l: 0
    },
    yaxis: {
        showgrid: true,
        range: [ {{spot_price*0.98}}, {{spot_price*1.02}} ]
    },
    xaxis: {
        showgrid: true,
        range: [ {{ -1*xlimDex }},{{ xlimDex }} ]
    },
    font: {
        family: 'Courier New, monospace',
        size: 18,
        color: 'rgba(200,200,200,1)'
    }
  };

var updateLayoutVex = {
    title: {text: 'vex {{ticker}} {{ "%0.2f" | format(spot_price|float) }}'},
    paper_bgcolor: 'rgba(0,0,0,0)',
    plot_bgcolor: 'rgba(0,0,0,0)',
    width: 420,
    height: 420,
    autosize: false,
    showlegend: false,
    margin: {
      r: 80,l: 0
    },
    yaxis: {
        showgrid: true,
        range: [ {{spot_price*0.98}}, {{spot_price*1.02}} ]
    },
    xaxis: {
        showgrid: true,
        range: [ {{ -1*xlimVex }},{{ xlimVex }} ]
    },
    font: {
        family: 'Courier New, monospace',
        size: 18,
        color: 'rgba(200,200,200,1)'
    }
  };

var updateLayoutCex = {
    title: {text: 'cex {{ticker}} {{ "%0.2f" | format(spot_price|float) }}'},
    paper_bgcolor: 'rgba(0,0,0,0)',
    plot_bgcolor: 'rgba(0,0,0,0)',
    width: 420,
    height: 420,
    autosize: false,
    showlegend: false,
    margin: {
      r: 80,l: 0
    },
    yaxis: {
        showgrid: true,
        range: [ {{spot_price*0.98}}, {{spot_price*1.02}} ]
    },
    xaxis: {
        showgrid: true,
        range: [ {{ -1*xlimCex }},{{ xlimCex }} ]
    },
    font: {
        family: 'Courier New, monospace',
        size: 18,
        color: 'rgba(200,200,200,1)'
    }
  };

  Plotly.react(plotDivDex, updateDataDex, updateLayoutDex);
  Plotly.react(plotDivStateGex, updateDataStateGex, updateLayoutStateGex);
  Plotly.react(plotDivConv, updateDataConv, updateLayoutConv);
  Plotly.react(plotDivVex, updateDataVex, updateLayoutVex);
  Plotly.react(plotDivCex, updateDataCex, updateLayoutCex);

  </script>
  <div class="container">
  <span class="badge rounded-pill text-bg-dark">
  data tstamp: {{ tstamp }}
  </span><br>
  <span class="badge rounded-pill text-bg-dark">
  websocket tstamp: {{ ws_tstamp }}
  </span>
  {% if df | length == 0 %}
  <br>
  no data found.
  {% endif %}
  </div>
</div>
