<script>

function makeChartBarV2() {

	
	let bars = uPlot.paths.bars({align: 0, size: [1, 1], gap: 0});
	let bars1 = uPlot.paths.bars({align: 0, size: [1, 1], gap: 0});

	const opts = {
		title: "convexity-diff",
		width: 512,
		height: 512,
		series: [
			{},
			{
				label: "spot",
				scale: "scale0",
				value: (u, v) => v == null ? null : v.toFixed(2)+"",
				stroke: "rgba(200,200,200,1)",
				width: 2/devicePixelRatio,
			},
			{
				label: "value1",
				scale: "scale1",
				value: (u, v) => v == null ? null : v.toFixed(2) + "na",
				width: 1/devicePixelRatio,
				fill: "rgba(0,200,200,0.6)",
				paths: bars,
			}
		],
		axes: [
			{
				side: 0,
				stroke: "#666666",
				tick: {stroke: "#666666",width:1},
				grid: {stroke: "#666666",width:1},
			},
			{
				side: 3,
				scale: "scale0",
				values: (u, vals, space) => vals.map(v => v.toFixed(1) +""),
				stroke: "#666666",
				grid: {stroke: "#666666",width:1},
				tick: {stroke: "#666666",width:1},
			},
			{
				side: 1,
				scale: "scale1",
				values: (u, vals, space) => vals.map(v => v.toFixed(2) + "na"),
				stroke: "#666666",
				grid: {show: false},
				tick: {stroke: "#666666",width:1},
			},
		],
		// scales: {
		// 	"scale1": {
		// 		auto: false,
		// 		range: [0, 10],
		// 	}
		// }
	};
	
	return new uPlot(opts, [], document.getElementById("ChartBarV2"));
}

let mychartBarV2 = makeChartBarV2();


function updateChartBarV2(data){
	mychartBarV2.setData(data);
}


</script>
