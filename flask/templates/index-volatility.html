<script>

function makeChartVolatility(opts) {
	let points = uPlot.paths.points()
	opts = uPlot.assign({
		scales: {
			x: {
				time: false,
			},
		},
		focus: {
			alpha: 0.3,
		},
		cursor: {
			lock: true,
			drag: {
				x: true,
				y: true,
			},
			sync: {
				key: 1,
				scales: ["x", "y"],
			},
			focus: {
				prox: 30,
			}
		},
		series: [
			{},
			{
				stroke: null,
				fill: "rgba(0,255,0,0.5)", // scale: "volatility",
				paths: points,
			},
			{
				stroke: null,
				fill: "rgba(255,0,0,0.5)", // scale: "volatility",
				paths: points,
			},
		],
	}, opts);

	return new uPlot(opts, [], document.getElementById("mySPXVolatility"));
}

function linesVolatilityPlugin({linesVolatility}) {
	function drawLines(u) {
  		const { ctx, bbox } = u;
		linesVolatility.forEach( item => {
			xVal = item[0];
			color = item[1];
			let x4 = u.valToPos(xVal, 'x', true);
			let ylft = u.valToPos(u.scales.y.min, 'y', true);
			let yrgt = u.valToPos(u.scales.y.max, 'y', true);
			u.ctx.save();
			u.ctx.beginPath();
			u.ctx.moveTo(ylft, x4);
			u.ctx.lineTo(yrgt, x4);
			u.ctx.setLineDash([5,5]);
			u.ctx.lineWidth = 1.5;
			u.ctx.strokeStyle = color;
			u.ctx.stroke();
			u.ctx.restore();
		});
	}

  return {
    hooks: {
      draw: drawLines,
    }
  };
}

const linesVolatility = [];

let mychartVolatility = makeChartVolatility({
	width: 210,
	height: 420,
	title: "volatility*",
	scales: {
		x: {
			dir: 1,
			ori: 1,
		},
		y: {
			dir: 1,
			ori: 0,
		}
	},
	plugins: [
		linesVolatilityPlugin({linesVolatility})
	],
	axes: [
		{
			side: 3, // scale: "scaleY",
			stroke: "#666666",
			tick: {stroke: "#666666",width:1},
			grid: {stroke: "#666666",width:1},
		},
		{
			side: 0,
			stroke: "#666666",
			grid: {stroke: "#666666",width:1},
			tick: {stroke: "#666666",width:1},
		},
	],
});


function updateChartVolatility(data){
	linesVolatility[0] = [data.spx_price,'white'];
	linesVolatility[1] = [data.plus_expected_move,'gray'];
	linesVolatility[2] = [data.minus_expected_move,'gray'];
	linesVolatility[3] = [data.major_pos_gex_strike,'green'];
	linesVolatility[4] = [data.major_neg_gex_strike,'red'];
	linesVolatility[5] = [data.major_pos_convexity,'cyan'];
	linesVolatility[6] = [data.major_neg_convexity,'purple'];
	//mychartVolatility.setScale('scaleY', {min: data.spot_min_lim, max: data.spot_max_lim});
	mychartVolatility.setData(data.volatility_list);

}


</script>
