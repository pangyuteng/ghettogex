<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script src="https://unpkg.com/htmx.org@1.9.12" integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/ws.js"></script>
    
    <script src='https://cdn.plot.ly/plotly-2.35.2.min.js'></script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/d3/3.5.17/d3.min.js'></script>

    <style>


    </style>
</head>

<body>

<div hx-ext="ws" ws-connect="/ws-prices"></div>
<div hx-ext="ws" ws-connect="/ws-gex?ticker=^SPX"></div>
<div hx-ext="ws" ws-connect="/ws-gex?ticker=^NDX"></div>
<div hx-ext="ws" ws-connect="/ws-gex?ticker=BTC-USD"></div>

<div class="container">

    <div class="row">
        <div id="prices"></div>
    </div>

    <div class="row">

      <div class="col-sm">
        <div id="div-SPX"></div>
      </div>

      <div class="col-sm">
        <div id="div-NDX"></div>
      </div>

      <div class="col-sm">
        <div id="div-BTC-USD"></div>
      </div>

    </div>

    <div class="row">
        <div id="footnote">
        <hr>
        footnote: {{footnote}}
        </div>
    </div>

</div>


</body>
</html>
