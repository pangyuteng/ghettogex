
<div id="prices" hx-swap-oob="true">
<table>
<tr>
<td>
<span class="badge rounded-pill text-bg-secondary">
tstamp:{{ tstamp }}
</span>
</td>
{% for ticker,myitem in mydict.items() %}
<td>
{% if myitem.regularMarketPreviousClose < myitem.previousClose %} 
<span class="badge rounded-pill text-bg-danger">
{% else %}
<span class="badge rounded-pill text-bg-success">
{% endif %}
{{ticker}}, {{myitem.previousClose}}
</span>
</td>
{% endfor %}
</tr>
</table>
<hr>
</div>
